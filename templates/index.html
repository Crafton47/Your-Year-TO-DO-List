<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year Plan To Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
            <h1>📅 Year Plan To Do List</h1>
            <div class="user-info">
                <span class="user-greeting">Hello, <strong id="username-display">{{ username }}</strong></span>
            </div>
            <div class="year-selector">
                <label for="year-select">Select Year:</label>
                <select id="year-select">
                    <option value="2024">2024</option>
                    <option value="2025" selected>2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                </select>
            </div>
        </header>
        
        <div class="months-grid" id="months-grid">
            <!-- Month cards will be generated by JavaScript -->
        </div>
    </div>

    <!-- Modal for adding tasks -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Add Task</h2>
            <input type="text" class="modal-input" id="task-input" placeholder="Enter your task...">
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="cancel-btn">Cancel</button>
                <button class="modal-btn save" id="save-btn">Save Task</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
