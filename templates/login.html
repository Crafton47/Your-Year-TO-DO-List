<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year Plan - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-background">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        
        <div class="auth-box">
            <div class="auth-header">
                <h1>📅 Year Plan</h1>
                <p>Plan your year, achieve your goals</p>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form {% if page == 'register' %}hidden{% endif %}">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required placeholder="Enter your password">
                </div>
                <div class="form-group remember-me">
                    <label>
                        <input type="checkbox" name="remember" id="remember-me">
                        <span>Remember me</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
                <p class="form-footer">Don't have an account? <a href="#" id="show-register">Sign up</a></p>
                <p class="error-message" id="login-error"></p>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" class="auth-form {% if page == 'login' %}hidden{% endif %}">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" name="username" required placeholder="Choose a username" minlength="3">
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" required placeholder="Create a password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="register-confirm">Confirm Password</label>
                    <input type="password" id="register-confirm" name="confirm" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
                <p class="form-footer">Already have an account? <a href="#" id="show-login">Sign in</a></p>
                <p class="error-message" id="register-error"></p>
            </form>
        </div>
    </div>
    
    <script src="/static/login.js"></script>
</body>
</html>
